<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Will you be my Valentine?</title>
  <style>
    :root{
      --bg1:#f7c6d8;
      --bg2:#f3b7cf;
      --card:#f6f1ee;
      --shadow: 0 18px 60px rgba(0,0,0,.15);
      --yes:#ff3b83;
      --yes2:#ff2d75;
      --text:#222;
      --muted:#6b6b6b;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100svh;
      display:grid;
      place-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 40% 20%, rgba(255,255,255,.45), transparent 60%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow:hidden;
    }

    .wrap{
      width:min(720px, 92vw);
      padding:28px;
      display:grid;
      place-items:center;
    }

    .card{
      width:min(560px, 92vw);
      background: var(--card);
      border-radius:18px;
      box-shadow: var(--shadow);
      padding:34px 26px 22px;
      text-align:center;
      position:relative;
    }

    .emoji{
      width:86px;
      height:86px;
      margin:0 auto 14px;
      display:grid;
      place-items:center;
      position:relative;
    }
    .emoji .face{
      width:74px;height:74px;border-radius:50%;
      background:#f2b56e;
      position:relative;
      box-shadow: inset 0 -10px 0 rgba(0,0,0,.06);
    }
    .eye{position:absolute; top:28px; width:8px; height:8px; border-radius:50%; background:#111;}
    .eye.left{left:22px;}
    .eye.right{right:22px;}
    .beak{
      position:absolute; left:50%; top:38px; transform:translateX(-50%);
      width:0; height:0;
      border-left:6px solid transparent;
      border-right:6px solid transparent;
      border-top:10px solid #ff7aa8;
    }
    .heart{
      position:absolute;
      right:-2px; top:-6px;
      width:26px; height:26px;
      transform: rotate(8deg);
    }
    .heart:before, .heart:after{
      content:"";
      position:absolute;
      width:14px;height:22px;
      background:#ff2d75;
      border-radius:14px 14px 0 0;
      left:6px; top:4px;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }
    .heart:after{
      transform: rotate(45deg);
      transform-origin: 100% 100%;
      left:12px;
    }

    h1{
      margin:0 0 18px;
      font-size: clamp(20px, 3.2vw, 28px);
      font-weight: 800;
      color: var(--text);
    }

    .stage{
      margin-top: 12px;
      height: 90px;
      position: relative;
      /* This is the playground where "No" runs around */
      width: min(440px, 84vw);
      margin-inline:auto;
    }

    .btn{
      border:0;
      cursor:pointer;
      font-weight:800;
      border-radius:999px;
      padding:14px 28px;
      font-size:18px;
      line-height:1;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }
    .btn:active{ transform: scale(.98); }

    .yes{
      background: linear-gradient(180deg, var(--yes), var(--yes2));
      color:white;
      box-shadow: 0 10px 22px rgba(255,45,117,.35);
      position:absolute;
      left: 10px;
      top: 18px;
      min-width: 120px;
    }
    .yes:hover{ filter: brightness(1.03); }

    /* The "No" button is positioned absolutely so we can move it */
    .no{
      position:absolute;
      left: 290px;
      top: 28px;
      background: transparent;
      color: #333;
      padding: 10px 16px;
      font-size: 14px;
      font-weight:700;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,.10);
      opacity: .92;
      min-width: 70px;
      box-shadow: 0 8px 18px rgba(0,0,0,.08);
      backdrop-filter: blur(4px);
    }
    .no:hover{ opacity: 1; }

    .hint{
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .toast{
      position: fixed;
      inset:auto 0 18px 0;
      margin:auto;
      width: min(520px, 92vw);
      background: rgba(0,0,0,.80);
      color:#fff;
      padding: 12px 14px;
      border-radius: 14px;
      text-align:center;
      font-size: 14px;
      opacity:0;
      transform: translateY(12px);
      transition: opacity .25s ease, transform .25s ease;
      pointer-events:none;
    }
    .toast.show{
      opacity:1;
      transform: translateY(0);
    }

    /* Small screens: keep everything comfy */
    @media (max-width: 420px){
      .card{ padding:30px 18px 18px; }
      .stage{ height: 98px; }
      .yes{ left: 6px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card" role="main" aria-label="Valentine card">
      <div class="emoji" aria-hidden="true">
        <div class="face">
          <span class="eye left"></span>
          <span class="eye right"></span>
          <span class="beak"></span>
        </div>
        <span class="heart"></span>
      </div>

      <h1><span id="name">SAMI,</span> will you be my valentine?</h1>

      <div class="stage" id="stage" aria-label="Buttons area">
        <button class="btn yes" id="yesBtn">Yes</button>
        <button class="btn no" id="noBtn" aria-label="No (good luck catching it)">No</button>
      </div>

      <div class="hint" id="hint">“No” seems a bit shy 😈</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ----- Quick config -----
    // Change the name here:
    const PERSON_NAME = "nirali";

    // How close the pointer can get before "No" runs away (in pixels)
    const DODGE_RADIUS = 90;

    // Extra spacing from stage edges so the button doesn't clip
    const EDGE_PADDING = 8;

    // ------------------------
    document.getElementById("name").textContent = PERSON_NAME;

    const stage = document.getElementById("stage");
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const toast = document.getElementById("toast");

    // Place No safely inside stage at start
    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function getRect(el){ return el.getBoundingClientRect(); }

    function setNoPosition(x, y){
      // x/y are within stage coordinates
      noBtn.style.left = `${x}px`;
      noBtn.style.top  = `${y}px`;
    }

    function randomSpotAwayFrom(pointerX, pointerY){
      const s = getRect(stage);
      const b = getRect(noBtn);

      const maxX = s.width - b.width - EDGE_PADDING;
      const maxY = s.height - b.height - EDGE_PADDING;

      // Try multiple random positions until we find one far enough
      for (let i = 0; i < 25; i++){
        const x = EDGE_PADDING + Math.random() * maxX;
        const y = EDGE_PADDING + Math.random() * maxY;

        const btnCenterX = s.left + x + b.width/2;
        const btnCenterY = s.top  + y + b.height/2;

        const dx = btnCenterX - pointerX;
        const dy = btnCenterY - pointerY;
        const dist = Math.hypot(dx, dy);

        if (dist > DODGE_RADIUS + 40) return { x, y };
      }

      // Fallback: just pick anything inside
      return {
        x: EDGE_PADDING + Math.random() * maxX,
        y: EDGE_PADDING + Math.random() * maxY
      };
    }

    function moveNoAway(pointerX, pointerY){
      const spot = randomSpotAwayFrom(pointerX, pointerY);
      setNoPosition(spot.x, spot.y);
    }

    function pointerNearNo(pointerX, pointerY){
      const b = getRect(noBtn);
      const cx = b.left + b.width / 2;
      const cy = b.top  + b.height / 2;
      const dist = Math.hypot(cx - pointerX, cy - pointerY);
      return dist < DODGE_RADIUS;
    }

    // Desktop mouse movement
    window.addEventListener("mousemove", (e) => {
      if (pointerNearNo(e.clientX, e.clientY)){
        moveNoAway(e.clientX, e.clientY);
      }
    }, { passive: true });

    // Mobile touch movement
    window.addEventListener("touchstart", (e) => {
      const t = e.touches && e.touches[0];
      if (!t) return;
      if (pointerNearNo(t.clientX, t.clientY)){
        moveNoAway(t.clientX, t.clientY);
      }
    }, { passive: true });

    window.addEventListener("touchmove", (e) => {
      const t = e.touches && e.touches[0];
      if (!t) return;
      if (pointerNearNo(t.clientX, t.clientY)){
        moveNoAway(t.clientX, t.clientY);
      }
    }, { passive: true });

    // Extra: if they manage to click No, still dodge (and tease)
    noBtn.addEventListener("click", (e) => {
      const x = e.clientX || (e.touches && e.touches[0]?.clientX) || (getRect(noBtn).left);
      const y = e.clientY || (e.touches && e.touches[0]?.clientY) || (getRect(noBtn).top);
      moveNoAway(x, y);
      showToast("Nice try 😭");
    });

    // Yes behavior
    yesBtn.addEventListener("click", () => {
      showToast("Yessss! 💖 Screenshot this and send it 😌");
      // Optional: replace card content after yes
      setTimeout(() => {
        document.querySelector("h1").textContent = "Deal sealed 💍💖";
        document.getElementById("hint").textContent = "Now go and act like you meant it 😄";
        noBtn.style.display = "none";
        yesBtn.textContent = "Aww 😭";
      }, 500);
    });

    // Initial positioning so No starts “far”
    function init(){
      // Put No toward the right, but still inside
      const s = getRect(stage);
      const b = getRect(noBtn);

      const startX = clamp(s.width - b.width - 16, EDGE_PADDING, s.width - b.width - EDGE_PADDING);
      const startY = clamp(28, EDGE_PADDING, s.height - b.height - EDGE_PADDING);
      setNoPosition(startX, startY);
    }
    window.addEventListener("load", init);
    window.addEventListener("resize", init);

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove("show"), 1800);
    }
  </script>
</body>
</html>
